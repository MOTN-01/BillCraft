name: CI

on:
  push:
    branches: [main, stable-3.0]
  pull_request:
    branches: [main, stable-3.0]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v
