name: Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [stable-3.0]
    types: [completed]

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: pip install -r requirements.txt
      - run: sudo systemctl restart invoice
